<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando tags de código embutido e pré-formatado</title>
</head>
<body>
    <!--Exercício 1 com code(código embutido)-->
    <code>console.log("Olá, mundo!");</code>
    <br>
    <!--Exercício 2 com code(código embutido)-->
    <code>x = a + b;</code>
    <!--Exercício 1 com pre(pré-formatado)-->
    <pre>
        Linha 1
        Linha 2
        Linha 3
    </pre>
    <!--Exercício 2 com pre(pré-formatado)-->
    <pre>
        Nome: Luis
        Função: Programador
        Status: Codando
    </pre>
</body>
</html>
