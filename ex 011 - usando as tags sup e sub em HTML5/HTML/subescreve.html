<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escrevendo acima e abaixo das coisas em HTML</title>
</head>
<body>
    <!--Exercício 1 com sup-->
    <p>2<sup>3</sup></p>
    <!--Exercício 2 com sup-->
    <p>x<sup>2</sup></p>
    <!--Exercício 1 com sub-->
    <p>H <sub>2</sub>O</p>
    <!--Exercício 2 com sub-->
    <p>CO<sub>2</sub></p>
</body>
</html>
