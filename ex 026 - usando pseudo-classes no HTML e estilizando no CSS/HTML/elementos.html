<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando Pseudo-elemento</title>
    <style>
        a::after{
            content: ' [Victory Road] ';
            text-decoration: none;
            font-weight: normal;
            color: darkgray;
        }

        .especial{
            background-color: rgb(143, 108, 148);
        }

        .especial::before{
            content: '➔';
        }

        .especial::after{
            content: '🠔';
        }
    </style>
</head>
<body>
    <a href="https://www.nerdmaldito.com/2020/05/lista-com-todos-os-jogos-dados-pela.html" class="especial">Todos os jogos dados pela epic até 2025 site do Nerdmaldito</a>
</body>
</html>
