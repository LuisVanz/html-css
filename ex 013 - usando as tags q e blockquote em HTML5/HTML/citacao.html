<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicando citações e bloco de citações no site</title>
</head>
<body>
    <!--Exercício 1 com q(citação curta)-->
    <q>O conhecimento é poder.</q>
    <br>
    <!--Exercício 2 com q(citação curta)-->
    <q>Tempo é dinheiro.</q>
    <!--Exercício 1 com blockquote(citação longa)-->
    <blockquote>
        A persistência é o caminho do êxito. Nunca desista dos seus sonhos.
    </blockquote>
    <!--Exercício 2 com blockquote(citação longa)-->
    <blockquote>
        A educação é a arma mais poderosa que você pode usar para mudar  o mundo.
    </blockquote>
</body>
</html>
