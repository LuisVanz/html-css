<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif; /* colocando uma fonte por padrão */

        }

        table {
            width: 400px; /* largura de 400px */
            border-collapse: collapse; /* colocando a borda ficar junto na tabela */
        }

        tr.linha {
            background-color: darkgray;
        }

        tr.linha2{
            background-color: rgb(39, 180, 190);
        }

        td {
            border: 1px solid black; /*  largura da borda 1 px/ estilo sólido/ e cor preta */
            padding: 8px; /* espaçamento de 8px */
        }

        td.dado{
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1>Minha primeira tabela</h1>
    <table>
        <tr class="linha">
            <td>A1</td>
            <td>B1</td>
            <td>C1</td>
        </tr>
        <tr>
            <td>A2</td>
            <td>B2</td>
            <td>C2</td>
        </tr>
        <tr class="linha2">
            <td>A3</td>
            <td>B3</td>
            <td>C3</td>
        </tr>
        
        <tr>
            <td>A4</td>
            <td class="dado">B4</td>
            <td>C4</td>
        </tr>
        <tr>
            <td>A5</td>
            <td>B5</td>
        </tr>
        <tr>
            <td class="dado">A6</td>
        </tr>
    </table>
</body>
</html>
