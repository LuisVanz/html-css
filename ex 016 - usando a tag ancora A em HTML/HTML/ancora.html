<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando a tag ancora de diferentes formas em um site com HTML</title>
</head>
<body>
    <!--Exercícios com <a href="..."> simples-->
    <!--Exercício 1 - Link para o Google -->
    <a href="https://www.google.com">Google</a>
    <br>
    <!--Exemplo 2: Link para uma página local-->
    <a href="ancora.html">ancora</a>
    <br>
    <!--Exercícios com target="_blank" e target="_self" -->
    <!--Exemplo 1: Abrir em nova aba-->
    <a href="https://www.wikipedia.org" target="_blank">Wikipedia</a>
    <br>
    <!--Exemplo 2: Abrir na mesma aba-->
    <a href="https://quantoquevaicustar.com.br/ofertas-em-destaque/" target="_self">Ofertas de jogos em destaque do Quanto Que Vai Custar</a>
    <br>
    <!--Exercícios com target e rel usando prev e next-->
    <!--Exemplo 1: Próxima página-->
    <a href="/HTML/ancora2.html" target="_self" rel="next">Página 2</a>
</body>
</html>
