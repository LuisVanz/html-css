<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando ID e seletores para mostrar sua diferença no HTML e CSS</title>
    <style>
        #destaque{
            color: red;
            font-weight: bold;
        }
        .importante{
            color: blue;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!--Exercício 1: Usando id para estilizar um único elemento-->
    <p>Este parágrafo não tem estilo especial.</p>
    <p id="destaque">Este parágrafo está com destaque usando ID.</p>
    <!--Exercício 2: Usando class para estilizar múltiplos elementos-->
    <p class="importante">Este parágrafo é importante.</p>
    <p>Este parágrafo não tem estilo especial.</p>
    <p class="importante">Outro parágrafo importante.</p>
</body>
</html>
