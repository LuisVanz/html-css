<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usando videos no site</title>
</head>
<body>
    <!--Usando um video baixado-->
    <video preload="metadata" controls>
        <source src="/VIDEO/outono.mp4" type="VIDEO/mp4">
    </video>
    <!--Usando video do youtube-->
    <iframe width="640" height="360" src="https://www.youtube.com/embed/4WQezVATpU8" title="ALAN foi ATERRORIZADO por uma IA, PAULA se ARREPENDENDO IMEDIATAMENTE !!" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
</body>
</html>
