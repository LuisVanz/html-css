<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando tag para sublinhar coisas em HTML5</title>
</head>
<body>
    <!--Exercício 1: Adicionando uma nova data-->
    <p>A reunião foi remarcada para <ins>20 de novembro</ins>.</p>

    <p>O novo endereço é <ins>Rua das Palmeiras, 123</ins>.</p>
    <!--Exercício 3: Atualizando um valor-->
    <p>O salário base agora é de <ins>R$ 2.500,00</ins>.</p>
</body>
</html>
