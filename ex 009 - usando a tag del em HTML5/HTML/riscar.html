<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando a tag del em HTML5</title>
</head>
<body>
    <!--Exercício 1: Corrigindo uma data-->
    <p>A reunião será no dia <del>15 de março</del>.</p>
    <!--Exercício 2: Removendo um preço antigo-->
    <p>De <del>R$ 199,90</del> por R$ 149,90!</p>
    <!--Exercício 3: Atualizando uma informação-->
    <p>O evento acontecerá em <del>São Paulo</del>, agora será no Rio de Janeiro.</p>
</body>
</html>
