<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando a tag marca texto no HTML5</title>
</head>
<body>
    <!--Exercício 1: Destaque uma palavra importante-->
    <p>A luz do sol é uma fonte de <mark>energia</mark> renovável</p>
    <!--Exercício 2: Marque a resposta correta-->
    <p>A capital do Brasil é <mark>Brasília</mark>, e não o Rio de Janeiro.</p>
    <!--Exercício 3: Enfatize um trecho de atenção-->
    <p><mark>Atenção: não desligue o computador</mark> durante a atualização.</p>
</body>
</html>
