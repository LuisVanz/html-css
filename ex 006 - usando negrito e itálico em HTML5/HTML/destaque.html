<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usando negrito e itálico em HTML5</title>
</head>
<body>
    <!--Exercício 1: Destaque a palavra importante-->
    <p>A alimentação saudável é muito <strong>importante</strong> para a saúde</p>
    <!--Exercício 2: Negrito em uma frase-->
    <p><strong>Atenção: o prazo final para entrega é amanhã!</strong></p>
    <!--Exercício 3: Destaque uma expressão estrangeira-->
    <p>Ela sempre diz que vive com muito <em>joie de vivre</em></p>
    <!--Exercício 4: Ênfase em uma opinião-->
    <p>Eu acho que essa foi <em>a melhor apresentação do evento.</em></p>
</body>
</html>
